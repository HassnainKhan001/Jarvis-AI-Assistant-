<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00f3ff" />
            <stop offset="100%" stop-color="#00f3ff" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#9400ff" />
            <stop offset="100%" stop-color="#9400ff" stop-opacity="0" />
        </radialGradient>
    </defs>
    <!-- Background glow -->
    <circle cx="32" cy="32" r="30" fill="url(#glow)" />
    <!-- Outer ring -->
    <circle cx="32" cy="32" r="26" fill="transparent" stroke="#00f3ff" stroke-width="2" stroke-dasharray="8 4" opacity="0.8"/>
    <!-- Inner ring -->
    <circle cx="32" cy="32" r="18" fill="transparent" stroke="#00f3ff" stroke-width="1.5" opacity="0.9"/>
    <!-- Core -->
    <circle cx="32" cy="32" r="10" fill="url(#coreGlow)" />
</svg>
